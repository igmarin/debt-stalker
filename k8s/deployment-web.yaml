apiVersion: apps/v1
kind: Deployment
metadata:
  name: debt-stalker-web
  namespace: debt-stalker
  labels:
    app: debt-stalker
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: debt-stalker
      component: web
  template:
    metadata:
      labels:
        app: debt-stalker
        component: web
    spec:
      containers:
        - name: debt-stalker
          image: ghcr.io/igmarin/debt-stalker:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: debt-stalker-config
            - secretRef:
                name: debt-stalker-secrets
          env:
            - name: PHX_SERVER
              value: "true"
            - name: RELEASE_NAME
              value: "debt_stalker"
            - name: OBAN_QUEUES
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
