apiVersion: apps/v1
kind: Deployment
metadata:
  name: debt-stalker
  namespace: debt-stalker
  labels:
    app: debt-stalker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: debt-stalker
  template:
    metadata:
      labels:
        app: debt-stalker
    spec:
      containers:
        - name: debt-stalker
          image: ghcr.io/igmarin/debt-stalker:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: debt-stalker-config
            - secretRef:
                name: debt-stalker-secrets
          env:
            - name: PHX_SERVER
              value: "true"
            - name: RELEASE_NAME
              value: "debt_stalker"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
