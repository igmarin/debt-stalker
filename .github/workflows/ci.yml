name: CI

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.18.3"
  OTP_VERSION: "27.3"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: debt_stalker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            build-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo (strict)
        run: mix credo --strict

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Create PLT directory
        run: mkdir -p priv/plts

      - name: Dialyzer
        run: mix dialyzer --halt-exit-status

      - name: Run tests with coverage
        run: mix test --cover
        env:
          DATABASE_URL: ecto://postgres:postgres@localhost/debt_stalker_test

  k8s-dry-run:
    name: k8s Manifest Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate k8s manifests
        run: |
          python3 -c "
          import yaml, sys, glob
          errors = []
          required_fields = {
              'Deployment': ['apiVersion', 'kind', 'metadata', 'spec'],
              'Service': ['apiVersion', 'kind', 'metadata', 'spec'],
              'ConfigMap': ['apiVersion', 'kind', 'metadata', 'data'],
              'Secret': ['apiVersion', 'kind', 'metadata', 'type'],
              'Namespace': ['apiVersion', 'kind', 'metadata'],
              'Job': ['apiVersion', 'kind', 'metadata', 'spec'],
              'HorizontalPodAutoscaler': ['apiVersion', 'kind', 'metadata', 'spec'],
          }
          for f in sorted(glob.glob('k8s/*.yaml')):
              try:
                  docs = list(yaml.safe_load_all(open(f)))
                  for doc in docs:
                      if doc is None:
                          continue
                      kind = doc.get('kind', 'Unknown')
                      missing = [k for k in required_fields.get(kind, ['apiVersion', 'kind', 'metadata']) if k not in doc]
                      if missing:
                          errors.append(f'{f}: {kind} missing required fields: {missing}')
                      # Check metadata.name exists
                      if 'metadata' in doc and 'name' not in doc.get('metadata', {}):
                          errors.append(f'{f}: {kind} missing metadata.name')
                  print(f'{f}: OK ({len([d for d in docs if d])} doc(s))')
              except yaml.YAMLError as e:
                  errors.append(f'{f}: YAML parse error: {e}')
          if errors:
              print()
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print()
          print('All k8s manifests validated successfully.')
          "

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_CONFIG: .gitleaks.toml
