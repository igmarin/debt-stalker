name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      approve_deploy:
        description: "Approve deployment to cluster"
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cluster
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: production
      url: https://debt-stalker.example.com
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.approve_deploy == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.31.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Run migration job
        run: |
          kubectl apply -f k8s/migration-job.yaml
          kubectl wait --for=condition=complete job/debt-stalker-migrate -n debt-stalker --timeout=120s

      - name: Deploy web
        run: |
          kubectl apply -f k8s/deployment-web.yaml
          kubectl rollout status deployment/debt-stalker-web -n debt-stalker --timeout=180s

      - name: Deploy worker
        run: |
          kubectl apply -f k8s/deployment-worker.yaml
          kubectl rollout status deployment/debt-stalker-worker -n debt-stalker --timeout=180s

      - name: Apply service and HPA
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa-worker.yaml

      - name: Verify deployment
        run: |
          echo "Web pods:"
          kubectl get pods -n debt-stalker -l component=web -o wide
          echo "Worker pods:"
          kubectl get pods -n debt-stalker -l component=worker -o wide
          echo "HPA:"
          kubectl get hpa -n debt-stalker
